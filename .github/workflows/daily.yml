name: Actualizar y publicar

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "astro.config.mjs"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /
      PUBLIC_WEB3FORMS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run pipeline
      - run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'https://guiamontilla.es' }}
          BASE_PATH: /

      - name: Guardar eventos y noticias en el repo
        run: |
          git config user.name "Guía Montilla Bot"
          git config user.email "bot@guia-montilla.local"
          git add data/events.json data/news.json
          git diff --staged --quiet || git commit -m "Actualización automática $(date +%Y-%m-%d) [skip ci]"
          git push || true

      - name: Subir a IONOS (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.IONOS_FTP_SERVER }}
          username: ${{ secrets.IONOS_FTP_USERNAME }}
          password: ${{ secrets.IONOS_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.IONOS_FTP_SERVER_DIR || '/' }}
          dangerous-clean-slate: false
          log-level: minimal
