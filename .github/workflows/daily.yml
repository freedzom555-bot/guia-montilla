name: Actualizar y publicar

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "astro.config.mjs"
      - ".github/workflows/daily.yml"

permissions:
  contents: write

concurrency:
  group: ionos-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[quick-only]') }}
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /
      PUBLIC_WEB3FORMS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run pipeline
      - run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'https://guiamontilla.es' }}
          BASE_PATH: /

      - name: Guardar eventos y noticias en el repo
        run: |
          git config user.name "Guía Montilla Bot"
          git config user.email "bot@guia-montilla.local"
          git add data/events.json data/news.json
          git diff --staged --quiet || git commit -m "Actualización automática $(date +%Y-%m-%d) [skip ci]"
          git push || true

      - name: Subir a IONOS (SFTP solo cambios)
        env:
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.IONOS_FTP_SERVER_DIR || '/Guiamontilla/' }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          REMOTE_DIR="${SFTP_DIR%/}/"
          attempt=1
          max_attempts=3
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "SFTP attempt ${attempt}/${max_attempts}"
            if lftp -u "$SFTP_USER,$SFTP_PASS" "sftp://$SFTP_HOST:22" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 5
          set net:reconnect-interval-base 10
          set net:reconnect-interval-multiplier 2
          set net:timeout 60
          set cmd:fail-exit yes
          lcd dist
          cd ${REMOTE_DIR}
          mirror --reverse --only-newer --continue --parallel=2 --verbose
          bye
          EOF
            then
              echo "SFTP upload OK"
              exit 0
            fi
            echo "SFTP failed on attempt ${attempt}"
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "SFTP failed after ${max_attempts} attempts"
              exit 1
            fi
            sleep $((attempt * 20))
            attempt=$((attempt + 1))
          done
